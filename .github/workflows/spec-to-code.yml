name: Spec to Code

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check for spec file changes
        id: check_specs
        run: |
          git fetch origin "${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -E '(spec|plan|tasks).*\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_specs=false" >> "$GITHUB_OUTPUT"
            echo "No spec file changes found, skipping."
          else
            echo "has_specs=true" >> "$GITHUB_OUTPUT"
            echo "Spec files changed:"
            echo "$CHANGED"
          fi

      - name: Install uv
        if: steps.check_specs.outputs.has_specs == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Install specify-cli
        if: steps.check_specs.outputs.has_specs == 'true'
        run: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git

      - name: Install Cursor CLI
        if: steps.check_specs.outputs.has_specs == 'true'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Generate code with Cursor Agent
        if: steps.check_specs.outputs.has_specs == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          cat > /tmp/agent-prompt.txt << 'PROMPT_EOF'
          You are using GitHub Spec Kit for Spec-Driven Development.

          Execute the implement phase strictly:
          1. Check constitution.md if it exists.
          2. Follow tasks.md in order, complete each task using TDD (tests first).
          3. Only modify source code files, follow project conventions strictly.
          4. DO NOT create, modify, or delete any files under .github/ directory.
          5. DO NOT modify .gitignore file.
          6. If a task requires CI/CD config changes, skip that task.
          7. Output a summary of changes when done.

          Execute autonomously, do not ask for confirmation.
          PROMPT_EOF
          agent --force -p "$(cat /tmp/agent-prompt.txt)"

      - name: Clean and push generated code
        if: steps.check_specs.outputs.has_specs == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout HEAD -- .github/ 2>/dev/null || true
          git checkout HEAD -- .gitignore 2>/dev/null || true
          git rm -rf --cached node_modules 2>/dev/null || true
          git rm -rf --cached .next 2>/dev/null || true
          git rm -rf --cached dist 2>/dev/null || true
          git rm -rf --cached build 2>/dev/null || true
          git rm -rf --cached coverage 2>/dev/null || true

          git add -A
          if git diff --staged --quiet; then
            echo "No code changes, skipping commit."
          else
            git commit -m "chore(auto): generate code from spec (Cursor + Spec Kit)"
            git push
          fi
