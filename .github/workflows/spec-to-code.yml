name: Spec to Code 自动生成（Cursor + Spec Kit）

on:
  pull_request:
    branches: [ develop ]
    types: [ opened, synchronize ]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: 检查是否包含 spec 文件变更
        id: check_specs
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '(spec|plan|task).*\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_specs=false" >> "$GITHUB_OUTPUT"
            echo "无 spec 相关文件变更，跳过后续步骤"
          else
            echo "has_specs=true" >> "$GITHUB_OUTPUT"
            echo "检测到 spec 文件变更:"
            echo "$CHANGED"
          fi

      - name: 安装 uv
        if: steps.check_specs.outputs.has_specs == 'true'
        uses: astral-sh/setup-uv@v5

      - name: 安装 specify-cli
        if: steps.check_specs.outputs.has_specs == 'true'
        run: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git

      - name: 安装 Cursor CLI
        if: steps.check_specs.outputs.has_specs == 'true'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Cursor Agent 生成代码
        if: steps.check_specs.outputs.has_specs == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AGENT_PROMPT: |
            你正在使用 GitHub Spec Kit 进行 Spec-Driven Development。

            请严格执行 implement 阶段：
            1. 检查 constitution.md（若存在）
            2. 按 tasks.md 顺序逐个完成任务（TDD：先测试后实现）
            3. 只修改源代码文件，严格遵守项目规范
            4. 禁止创建或修改 .github/ 目录下的任何文件
            5. 完成后输出变更总结

            自主执行，不要询问。
        run: |
          agent --force -p "$AGENT_PROMPT"

      - name: 提交并推送代码到 PR 分支
        if: steps.check_specs.outputs.has_specs == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git reset HEAD -- .github/
          git checkout -- .github/ 2>/dev/null || true
          
          git add -A
          if git diff --staged --quiet; then
            echo "无代码变更，跳过"
          else
            git commit -m "chore(auto): 根据 spec.md 生成代码（Cursor + Spec Kit）"
            git push
          fi
