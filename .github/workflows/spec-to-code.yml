name: Spec → Code 自动生成（Cursor + Spec Kit） - PR Target 版

on:
  pull_request_target:
    branches: [ develop ]
    types: [ opened, synchronize ]
    paths:
      - '**/spec.md'
      - '**/plan.md'
      - '**/tasks.md'
      - '**/*spec*.md'
      - '**/*plan*.md'
      - '**/*task*.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取 PR 的 feature 分支
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5

      - name: 安装 specify-cli
        run: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git

      - name: 安装 Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Cursor Agent 生成代码
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          agent --force -p <<'EOF'
你正在使用 GitHub Spec Kit 进行 Spec-Driven Development。

请严格执行 implement 阶段：
1. 检查 constitution.md（若存在）
2. 按 tasks.md 顺序逐个完成任务（TDD：先测试后实现）
3. 只修改源代码文件，严格遵守项目规范
4. 完成后输出变更总结

自主执行，不要询问。
EOF

      - name: 提交并推送代码到 PR 分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if git diff --staged --quiet; then
            echo "无代码变更，跳过"
          else
            git commit -m "chore(auto): 根据 spec.md 生成代码（Cursor + Spec Kit）"
            git push
          fi